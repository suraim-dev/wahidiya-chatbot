    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                300: '#E5C573',
                400: '#D4AF37',
                500: '#C5A059',
                600: '#B08D55',
                700: '#8C6B3D',
              },
              charcoal: {
                DEFAULT: '#0F0F0F',
                light: '#1A1A1A',
                dark: '#050505',
              },
            },
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              display: ['"Cinzel"', 'serif'],
              sans: ['"Manrope"', 'sans-serif'],
            },
            transitionTimingFunction: {
              'luxury': 'cubic-bezier(0.5, 0, 0, 1)', 
              'slow': 'cubic-bezier(0.4, 0, 0.2, 1)',
              'reveal': 'cubic-bezier(0.5, 0, 0, 1)',
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0F0F0F;
        color: #F3F4F6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      ::-webkit-scrollbar {
        display: none;
      }

      /* Standard Reveals */
      .reveal-container {
        overflow: hidden;
        display: block;
      }

      .reveal-slide-up {
        transform: translateY(100%);
        opacity: 0;
        transition: transform 1s cubic-bezier(0.5, 0, 0, 1), opacity 0.8s ease-out;
        will-change: transform, opacity;
      }
      
      .is-visible .reveal-slide-up {
        transform: translateY(0);
        opacity: 1;
      }

      .reveal-fade {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1s ease-out, transform 1s cubic-bezier(0.5, 0, 0, 1);
        will-change: transform, opacity;
      }

      .is-visible .reveal-fade {
        opacity: 1;
        transform: translateY(0);
      }

      .image-zoom {
        transform: scale(1.1);
        transition: transform 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        will-change: transform;
      }

      .is-visible .image-zoom {
        transform: scale(1);
      }
      
      .hover-underline-animation {
        display: inline-block;
        position: relative;
      }

      .hover-underline-animation::after {
        content: '';
        position: absolute;
        width: 100%;
        transform: scaleX(0);
        height: 1px;
        bottom: 0;
        left: 0;
        background-color: #D4AF37;
        transform-origin: bottom right;
        transition: transform 0.5s ease-out;
      }

      .hover-underline-animation:hover::after {
        transform: scaleX(1);
        transform-origin: bottom left;
      }

      @keyframes scroll-line {
        0% { transform: translateY(-101%); }
        15% { transform: translateY(0); }
        50% { transform: translateY(0); }
        100% { transform: translateY(101%); }
      }
      
      .animate-scroll-line {
        animation: scroll-line 2s cubic-bezier(0.7, 0, 0.3, 1) infinite;
      }

      .leaflet-control-zoom {
        border: none !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
      }
      .leaflet-control-zoom-in, .leaflet-control-zoom-out {
        background-color: #1A1A1A !important;
        color: #fff !important;
        border-color: rgba(255,255,255,0.1) !important;
      }
      .leaflet-control-zoom-in:hover, .leaflet-control-zoom-out:hover {
        background-color: #D4AF37 !important;
        color: #000 !important;
      }
    </style>
